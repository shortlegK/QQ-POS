name: CI/CD Pipeline for QQ-POS

# 觸發條件：push 或 PR 到 master / develop 分支
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    name: 執行測試
    runs-on: ubuntu-latest # 使用 GitHub 提供的乾淨 Linux 環境執行

    # 啟動 MySQL 服務 container
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: qq_pos_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. 取得程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 設定 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 快取 Gradle 依賴（加速後續執行）
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 初始化資料庫結構
      - name: Initialize database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot qq_pos_test < db/qqPosDB.sql

      # 5. 建立 .env 檔案（提供給 spring-dotenv 讀取）
      - name: Create .env file
        run: |
          cat > .env << EOF
          DB_URL_TEST=jdbc:mysql://127.0.0.1:3306/qq_pos_test?serverTimezone=Asia/Taipei
          DB_USERNAME_TEST=root
          DB_PASSWORD_TEST=root
          JWT_SECRET_KEY_TEST=${{ secrets.JWT_SECRET_KEY_TEST }}
          EOF

      # 6. 給 gradlew 執行權限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7. 執行所有測試
      - name: Run tests
        run: ./gradlew test

      # 8. 上傳測試報告
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()  # 無論成功或失敗都上傳
        with:
          name: test-report
          path: build/reports/tests/test/

      # 9. 上傳覆蓋率資料
      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-data
          path: |
            build/reports/jacoco/
            build/jacoco/
  coverage:
    name: 確認測試覆蓋率
    runs-on: ubuntu-latest
    needs: test

    steps:
      # 1. 取得程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 設定 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 快取 Gradle 依賴
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. 下載覆蓋率資料
      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: jacoco-data
          path: build/

      # 5. 驗證覆蓋率門檻
      - name: Check coverage threshold
        run: ./gradlew jacocoTestCoverageVerification

  deploy:
    name: 部署到 Railway
    runs-on: ubuntu-latest
    needs: [ test, coverage ]
    if: github.ref == 'refs/heads/master'  # 只有 master 才部署

    steps:
      # 1. 取得程式碼
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安裝 Railway CLI
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # 3. 部署到 Railway
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service QQ-POS --detach
