server:
  servlet:
    encoding:
      charset: UTF-8
      force-response: true


qq-pos:
  jwt:
    ttl-millis: 1200000

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
